# IDS Light - Terminal Color Scheme
# For use with terminal emulators (iTerm2, Alacritty, Kitty, etc.)
# Maps IDS Inditex Design System colors to ANSI 16-color palette.

[colors.primary]
background = "#ffffff"
foreground = "#000000"

[colors.cursor]
text = "#ffffff"
cursor = "#000000"

[colors.selection]
text = "#000000"
background = "#e3e3e3"

# Normal colors (0-7)
[colors.normal]
black   = "#ffffff"  # bg
red     = "#c93b3a"  # alt-red-high
green   = "#0aad0a"  # alt-green-mid
yellow  = "#ea732e"  # alt-orange-mid
blue    = "#1a1aff"  # core-ai-high
magenta = "#6b3daf"  # alt-purple-high
cyan    = "#0c7878"  # alt-teal-high
white   = "#000000"  # fg

# Bright colors (8-15)
[colors.bright]
black   = "#757575"  # content-low
red     = "#ff4a3f"  # alt-red-mid
green   = "#23f444"  # core-sales
yellow  = "#feb48d"  # alt-orange-high (light accent)
blue    = "#6680ff"  # core-ai-high (dark variant)
magenta = "#b15ff1"  # alt-purple-mid
cyan    = "#00a3a3"  # alt-teal-mid
white   = "#000000"  # content-default
